name: Build Windows Wheel with OpenBLAS and OpenVINO

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to trigger it manually from the website

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    # 1. Get the code AND the whisper.cpp submodule
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    # 2. Install Python
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    # 3. Compile OpenBLAS natively for Windows (MSVC)
    # We do this to avoid MinGW linker errors
    - name: Build OpenBLAS
      run: |
        git clone https://github.com/xianyi/OpenBLAS.git
        cd OpenBLAS
        cmake -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DNOFORTRAN=ON -DBUILD_SHARED_LIBS=OFF .
        cmake --build . --config Release
        mkdir ${{ github.workspace }}\openblas_build
        cp lib/Release/*.lib ${{ github.workspace }}\openblas_build\
        mkdir ${{ github.workspace }}\openblas_build\include
        cp openblas_config.h ${{ github.workspace }}\openblas_build\include\
        cp cblas.h ${{ github.workspace }}\openblas_build\include\

    # 4. Download pre-compiled OpenVINO for Windows (MSVC)
    - name: Download OpenVINO
      run: |
        curl -L -o openvino.zip https://storage.openvinotoolkit.org/repositories/openvino/packages/2023.3/windows/w_openvino_windows_2023.3.0.9052.x86_64.zip
        tar -xf openvino.zip
        mv w_openvino_windows_2023.3.0.9052.x86_64 openvino

    # 5. Install Python build tools
    - name: Install build tools
      run: python -m pip install --upgrade pip scikit-build-core ninja pybind11

    # 6. Build the actual Wheel
    - name: Build Wheel
      env:
        # These flags tell whisper.cpp to turn on OpenVINO and OpenBLAS
        CMAKE_ARGS: >-
          -DWHISPER_OPENVINO=ON
          -DGGML_BLAS=ON
          -DGGML_BLAS_VENDOR=OpenBLAS
          -DBLAS_INCLUDE_DIRS=${{ github.workspace }}\openblas_build\include
          -DBLAS_LIBRARIES=${{ github.workspace }}\openblas_build\openblas.lib
          -DOpenVINO_DIR=${{ github.workspace }}\openvino\runtime\cmake
      run: pip wheel . --no-deps -w wheelhouse/

    # 7. Upload the finished .whl file
    - uses: actions/upload-artifact@v4
      with:
        name: pywhispercpp-win-py${{ matrix.python-version }}
        path: wheelhouse/*.whl
